        .btn-grid { display: grid; gap: 12px; }
        button { padding: 15px; border: none; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn-1 { background: #7e22ce; } .btn-2 { background: #005088; } .btn-3 { background: #ca8a04; } .btn-4 { background: #d946ef; } .btn-5 { background: #333; }

    function sortear(act) {
        let r = document.getElementById('res');
        if (act === 'lectura' || act === 'discurso') {
            let h = pub.filter(p => p.genero === 'hombre');
            let s = h[Math.floor(Math.random()*h.length)];
            r.innerHTML = `<strong>${act.charAt(0).toUpperCase() + act.slice(1)}:</strong> ${s.nombre}`;
        } else {
            let p1, p2, valido = false, intentos = 0;
            while (!valido && intentos < 1000) {
                p1 = pub[Math.floor(Math.random()*pub.length)];
                p2 = pub[Math.floor(Math.random()*pub.length)];
                let esPareja = parejasCasadas.some(par => par.includes(p1.nombre) && par.includes(p2.nombre));
                let mismoGenero = (p1.genero === p2.genero);
                let ambosPrincipiantes = (p1.categoria === 'principiante' && p2.categoria === 'principiante');
                if (p1 !== p2 && !ambosPrincipiantes && (esPareja || mismoGenero)) valido = true;
                intentos++;
            }
            r.innerHTML = valido ? `<strong>Pareja:</strong> ${p1.nombre} y ${p2.nombre}` : "Presiona de nuevo.";
